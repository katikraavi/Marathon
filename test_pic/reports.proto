syntax = "proto3";

option go_package = "data-generator/reports";

package reports;

service ReportService {
  // stream time-based and event-based reports
  rpc StreamTimeBasedReports(EmptyRequest) returns (stream TimeBasedReport);
  rpc StreamEventBasedReports(EmptyRequest) returns (stream EventBasedReport);

  // control device mute state
  rpc MuteDevice(DeviceControlRequest) returns (DeviceControlResponse);
  rpc UnmuteDevice(DeviceControlRequest) returns (DeviceControlResponse);

  // current mute/unmute status of all devices
  rpc GetDeviceStatuses(EmptyRequest) returns (DeviceStatusResponse);
}

/*
Time-based reports send information from wearable devices every second. 
Report has 5 fields: 
- device id (integer number) from which the report is sent, 
- unix timestamp of report time in milliseconds, 
- runner's distance from starting line in centimeters, 
- array of unix timestamps in milliseconds for runner's heartbeats over the previous second,
- array of unix timestamps in milliseconds for runner's breaths over the previous second.
Arrays can be sent empty (for example, there can be a second in which breath does not happen).

Example of time-based report:
TimeBasedReport {
  DeviceId: 45,
  Timestamp: 1746645127337,
  Distance: 45056,
  Heartbeats: [1746645146337, 1746645146887], (2 heartbeats in a second)
  Breaths: [1746645146543] (1 breath in a second)   
}
*/
message TimeBasedReport {
  int32 device_id = 1;
  int64 timestamp = 2;
  int32 distance = 3;
  repeated int64 heartbeats = 4;
  repeated int64 breaths = 5;
}

/*Event-based reports send information from any registered wearable device if changes in
runner's blood pressure, blood oxugen concentration, temperature happen 
Report has 4 fields: 
- device id from which the report is sent, 
- unix timestamp of report time in milliseconds, 
- event id which indicates what vital changed (1 - blood pressure, 2 - blood oxygen, 3 - temperature) 
- array of vital parameters that were recorded at report time

Example of event-based report for changes in blood pressure level:
EventBasedReport {
  DeviceId: 45,
  Timestamp: 1746645127337,
  EventId: 1,
  EventData: [160, 90] (systolic and dystolic blood pressure)  
}

Example of event-based report for changes in blood oxygen level:
EventBasedReport {
  DeviceId: 45,
  Timestamp: 1746645127337,
  EventId: 2,
  EventData: [95] (percentage of oxygen saturation)  
}

Example of event-based report for changes in temperature level:
EventBasedReport {
  DeviceId: 45,
  Timestamp: 1746645127337,
  EventId: 3,
  EventData: [375] (Sent in tenths of degree Celsius, 37.5 is represented as 375)  
}
*/
message EventBasedReport {
  int32 device_id = 1;
  int64 timestamp = 2;
  int32 event_id = 3;
  repeated int32 event_data = 4;
}

// device control and utility messages
message DeviceControlRequest {
  int32 device_id = 1;
}

message DeviceControlResponse {
  string message = 1;
}

message DeviceStatus {
  int32 device_id = 1;
  bool muted = 2;
}

message DeviceStatusResponse {
  repeated DeviceStatus statuses = 1;
}

message EmptyRequest {}


